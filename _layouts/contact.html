---
layout: base
---
<section class="hero">
  <div class="section-inner contact-simple">
    <div class="hero-photo">
      <img class="avatar" src="{{ page.photo | relative_url }}" alt="{{ page.full_name }}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
      <div class="avatar" style="display:none; align-items:center; justify-content:center; font-size:52px; color:var(--accent);">RG</div>
    </div>

    <h1>{{ page.full_name }}</h1>

    <div class="social-row">
      {% if page.email %}
      <a href="mailto:{{ page.email }}" aria-label="Email" title="Email">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m4 7 8 6 8-6"/></svg>
      </a>
      {% endif %}
      {% if page.academia %}
      <a href="{{ page.academia }}" aria-label="Academia.edu" title="Academia.edu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 3 2 8l10 5 10-5-10-5z"/><path d="M6 10.5V16c0 1.5 2.7 3 6 3s6-1.5 6-3v-5.5"/></svg>
      </a>
      {% endif %}
      {% if page.orcid %}
      <a href="{{ page.orcid }}" aria-label="ORCID" title="ORCID">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><circle cx="9.2" cy="8.6" r="0.9" fill="currentColor" stroke="none"/><line x1="9.2" y1="11" x2="9.2" y2="16"/><path d="M12.2 11h1.6a2.7 2.7 0 0 1 0 5.4h-1.6z"/></svg>
      </a>
      {% endif %}
      {% if page.github %}
      <a href="{{ page.github }}" aria-label="GitHub" title="GitHub">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.58 2 12.25c0 4.53 2.87 8.37 6.84 9.73.5.1.68-.22.68-.5v-1.75c-2.78.62-3.37-1.36-3.37-1.36-.46-1.2-1.11-1.52-1.11-1.52-.9-.64.07-.63.07-.63 1 .07 1.53 1.06 1.53 1.06.89 1.57 2.34 1.12 2.91.86.09-.66.35-1.12.63-1.38-2.22-.26-4.56-1.14-4.56-5.06 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.3.1-2.7 0 0 .84-.28 2.75 1.05a9.3 9.3 0 0 1 5 0c1.9-1.33 2.75-1.05 2.75-1.05.55 1.4.2 2.44.1 2.7.64.72 1.03 1.63 1.03 2.75 0 3.93-2.34 4.79-4.57 5.05.36.32.68.94.68 1.9v2.82c0 .28.18.6.69.5A10.26 10.26 0 0 0 22 12.25C22 6.58 17.52 2 12 2z"/></svg>
      </a>
      {% endif %}
      {% if page.linkedin %}
      <a href="{{ page.linkedin }}" aria-label="LinkedIn" title="LinkedIn">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6.94 5a2 2 0 1 1-4 0 2 2 0 0 1 4 0zM3.3 8.75h3.28V21H3.3V8.75zm6.2 0h3.14v1.68h.05c.44-.83 1.5-1.7 3.1-1.7 3.32 0 3.93 2.18 3.93 5.02V21h-3.28v-5.66c0-1.35-.02-3.08-1.88-3.08-1.88 0-2.17 1.47-2.17 2.98V21H9.5V8.75z"/></svg>
      </a>
      {% endif %}
    </div>
  </div>
</section>

<section>
  <div class="section-inner contact-simple">
    <p class="eyebrow">{{ page.section_title | default: "Get in touch" }}</p>
    <div class="prose prose--narrow">
      {{ content }}
    </div>
  </div>
</section>
