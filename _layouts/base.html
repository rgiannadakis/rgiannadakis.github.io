<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
<meta name="description" content="{{ site.description }}">
<meta property="og:type" content="website">
<meta property="og:title" content="{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}">
<meta property="og:description" content="{{ site.description }}">
<meta property="og:url" content="{{ site.url }}{{ page.url }}">
<meta property="og:image" content="{{ site.url }}{{ page.photo | default: '/images/profile.png' }}">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}">
<meta name="twitter:description" content="{{ site.description }}">
<meta name="twitter:image" content="{{ site.url }}{{ page.photo | default: '/images/profile.png' }}">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Ccircle cx='24' cy='24' r='21' fill='%23F7F7F5' stroke='%230F295D' stroke-width='2'/%3E%3Ctext x='24' y='24' text-anchor='middle' dominant-baseline='central' font-family='Georgia,serif' font-size='17' fill='%230F295D'%3ERG%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>

<header class="bar">
  <div class="bar-inner">
    <a class="mark" href="{{ '/' | relative_url }}">
      <svg width="30" height="30" viewBox="0 0 48 48">
        <circle cx="24" cy="24" r="21" fill="none" stroke="currentColor" stroke-width="1.6"/>
        <text x="24" y="24" text-anchor="middle" dominant-baseline="central" font-family="Georgia, serif" font-style="normal" font-size="17" fill="currentColor">RG</text>
      </svg>
      Rafail Giannadakis
    </a>
    <nav class="links">
      <a href="{{ '/' | relative_url }}" aria-label="Home" title="Home" class="nav-home">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11.5 12 4l9 7.5"/><path d="M5.5 10v9.5a1 1 0 0 0 1 1H9.5a1 1 0 0 0 1-1V15a1 1 0 0 1 1-1h1a1 1 0 0 1 1 1v4.5a1 1 0 0 0 1 1h3a1 1 0 0 0 1-1V10"/></svg>
      </a>
      <a href="{{ '/cv/' | relative_url }}">CV</a>
      <a href="{{ '/publications/' | relative_url }}">Publications</a>
      <a href="{{ '/presentations/' | relative_url }}">Presentations</a>
      <a href="{{ '/teaching/' | relative_url }}">Teaching</a>
      <a href="{{ '/contact/' | relative_url }}">Contact</a>
      <a href="{{ '/full-cv/' | relative_url }}" class="nav-cv">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 19h14"/></svg>
        Full CV
      </a>
    </nav>
  </div>
</header>

<main>
{{ content }}
</main>

<footer class="bar">
  <div class="bar-inner">
    <span>© {{ 'now' | date: "%Y" }} Rafail Giannadakis</span>
    <div class="footer-links">
      <a href="mailto:giannadakis.uni@gmail.com" aria-label="Email" title="Email">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m4 7 8 6 8-6"/></svg>
      </a>
      <a href="https://crete.academia.edu/RafailGiannadakis" aria-label="Academia.edu" title="Academia.edu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 3 2 8l10 5 10-5-10-5z"/><path d="M6 10.5V16c0 1.5 2.7 3 6 3s6-1.5 6-3v-5.5"/></svg>
      </a>

      <a href="{{ '/contact/' | relative_url }}" aria-label="Contact" title="Contact">

      </a>
    </div>
  </div>
</footer>

</body>
</html>
